<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Aap DevBoard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
	    font-family:Arial,Helvetica,sans-serif;
	        min-height:100vh;
		    display:flex;
		        justify-content:center;
			    align-items:center;
			        background:linear-gradient(135deg,#2d0b59,#5b21b6,#9333ea);
				    color:#fff;
}
.card{
	    width:360px;
	        padding:30px;
		    border-radius:18px;
		        background:rgba(255,255,255,.08);
			    backdrop-filter:blur(10px);
			        box-shadow:0 10px 30px rgba(0,0,0,.25);
}
h1{font-size:2rem;margin-bottom:6px}
p{opacity:.8;margin-bottom:20px}
.task{
	    display:flex;
	        justify-content:space-between;
		    padding:12px 14px;
		        margin:10px 0;
			    background:rgba(255,255,255,.12);
			        border-radius:10px;
}
.badge{
	    background:#c084fc;
	        color:#2d0b59;
		    padding:3px 10px;
		        border-radius:20px;
			    font-size:.8rem;
			        font-weight:bold;
}
button{
	    width:100%;
	        margin-top:18px;
		    padding:12px;
		        border:none;
			    border-radius:10px;
			        background:#fff;
				    color:#5b21b6;
				        font-weight:bold;
					    cursor:pointer;
}
button:hover{opacity:.9}
</style>
	</head>

	<body>
		<div class="card">
			    <h1>Aap DevBoard</h1>
			        <p>Simple task tracker for developers.</p>

				    <div class="task">
					            <span>Fix Login API</span>
						            <span class="badge">High</span>
							        </div>

								    <div class="task">
									            <span>Update UI</span>
										            <span class="badge">Medium</span>
											        </div>

												    <div class="task">
													            <span>Deploy Build</span>
														            <span class="badge">Done</span>
															        </div>

																    <button>Add New Task</button>
		</div>
	</body>
</html>
